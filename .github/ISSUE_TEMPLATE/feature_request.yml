name: 💡 Feature Request
description: Suggest a new feature or plugin
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: Proposed API (if applicable)
      render: kotlin

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New Plugin
        - Core Enhancement
        - UI Improvement
        - Performance
        - Documentation
        - Other
